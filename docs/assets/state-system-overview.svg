<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">State System overview</title>
  <desc id="desc">A current architecture overview showing generic source, tool, and route contracts; instance readiness records; CLI-ready agent packages; federation packs without raw materialization; and source freshness status.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
    .title { font-size: 34px; font-weight: 700; }
    .subtitle { font-size: 16px; fill: #526170; }
    .label { font-size: 18px; font-weight: 700; }
    .body { font-size: 13px; fill: #445260; }
    .small { font-size: 12px; fill: #526170; }
    .badge { font-size: 10px; font-weight: 700; letter-spacing: .08em; }
    .box { stroke-width: 2; rx: 10; }
    .arrow { fill: none; stroke: #6b7c8f; stroke-width: 2.3; marker-end: url(#arrow); }
    .soft-arrow { fill: none; stroke: #9aa8b6; stroke-width: 1.9; stroke-dasharray: 7 7; marker-end: url(#softArrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L11,4 L0,8 Z" fill="#6b7c8f"/>
    </marker>
    <marker id="softArrow" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L11,4 L0,8 Z" fill="#9aa8b6"/>
    </marker>
  </defs>

  <rect width="1280" height="760" fill="#ffffff"/>
  <text x="44" y="58" class="title">State System</text>
  <text x="44" y="88" class="subtitle">Generic model-mediated work-state contracts, deployed instance readiness, CLI-ready packages, and governed federation. As of May 19, 2026.</text>

  <rect x="44" y="130" width="256" height="146" class="box" fill="#eef6ff" stroke="#2f7abf"/>
  <text x="64" y="162" class="label">Generic Contract Layer</text>
  <text x="64" y="190" class="body">SourceModuleSpec</text>
  <text x="64" y="211" class="body">ToolActionContract</text>
  <text x="64" y="232" class="body">QuestionRouteContract</text>
  <text x="64" y="254" class="badge" fill="#2f7abf">CONNECTOR INTERFACE</text>

  <rect x="348" y="130" width="256" height="146" class="box" fill="#edf8ef" stroke="#2f8a50"/>
  <text x="368" y="162" class="label">Instance Readiness</text>
  <text x="368" y="190" class="body">Capability packs</text>
  <text x="368" y="211" class="body">Preflight and freshness</text>
  <text x="368" y="232" class="body">Readiness and typed gaps</text>
  <text x="368" y="254" class="badge" fill="#2f8a50">ACCESS PROOF</text>

  <rect x="652" y="130" width="256" height="146" class="box" fill="#fff7e8" stroke="#b06b00"/>
  <text x="672" y="162" class="label">CLI-Ready Packages</text>
  <text x="672" y="190" class="body">personal state / Samantha</text>
  <text x="672" y="211" class="body">SampleCo / Caroline</text>
  <text x="672" y="232" class="body">PortfolioCo / Helena, ResearchCo / Ingrid</text>
  <text x="672" y="254" class="badge" fill="#b06b00">AGENT SURFACE</text>

  <rect x="956" y="130" width="256" height="146" class="box" fill="#f3f0ff" stroke="#6f55c9"/>
  <text x="976" y="162" class="label">Federated Routes</text>
  <text x="976" y="190" class="body">InstanceFederationPack</text>
  <text x="976" y="211" class="body">No raw materialization</text>
  <text x="976" y="232" class="body">Safe summaries and evidence refs</text>
  <text x="976" y="254" class="badge" fill="#6f55c9">GOVERNED QUERY</text>

  <path d="M300 203 H348" class="arrow"/>
  <path d="M604 203 H652" class="arrow"/>
  <path d="M908 203 H956" class="arrow"/>

  <rect x="44" y="338" width="256" height="176" class="box" fill="#f7fafc" stroke="#93a3b5"/>
  <text x="64" y="370" class="label">Reusable Sources</text>
  <text x="64" y="398" class="body">Relationship Substrate:</text>
  <text x="64" y="419" class="body">governed source module and</text>
  <text x="64" y="440" class="body">federated route, not a copy.</text>
  <text x="64" y="468" class="body">PAIA memory module:</text>
  <text x="64" y="489" class="body">source_module.paia_memory</text>

  <rect x="348" y="338" width="256" height="176" class="box" fill="#f7fafc" stroke="#93a3b5"/>
  <text x="368" y="370" class="label">personal state / Samantha</text>
  <text x="368" y="398" class="body">Garmin Connect: fresh local sync</text>
  <text x="368" y="419" class="body">Spotify: historical-cache stale</text>
  <text x="368" y="440" class="body">PAIA memory surfaces:</text>
  <text x="368" y="461" class="small">connector.personal.paia_memory.samantha</text>
  <text x="368" y="482" class="small">connector.personal.paia_memory.owner</text>

  <rect x="652" y="338" width="256" height="176" class="box" fill="#f7fafc" stroke="#93a3b5"/>
  <text x="672" y="370" class="label">SampleCo / Caroline</text>
  <text x="672" y="398" class="body">Linear: fresh watermark</text>
  <text x="672" y="419" class="body">GitHub: fresh watermark</text>
  <text x="672" y="440" class="body">Transcript raw pipeline: planned gap</text>
  <text x="672" y="461" class="body">Processed transcripts: planned gap</text>
  <text x="672" y="489" class="body">Federates to personal relationships.</text>

  <rect x="956" y="338" width="256" height="176" class="box" fill="#f7fafc" stroke="#93a3b5"/>
  <text x="976" y="370" class="label">Scaffolded Instances</text>
  <text x="976" y="398" class="body">PortfolioCo / Helena package scaffold</text>
  <text x="976" y="419" class="body">ResearchCo / Ingrid package scaffold</text>
  <text x="976" y="440" class="body">Readiness fields and gap refs</text>
  <text x="976" y="461" class="body">No private corpora in examples</text>
  <text x="976" y="489" class="badge" fill="#6b7280">PLANNED READINESS</text>

  <path d="M172 338 C172 304 476 304 476 276" class="soft-arrow"/>
  <path d="M476 338 V276" class="soft-arrow"/>
  <path d="M780 338 V276" class="soft-arrow"/>
  <path d="M1084 338 V276" class="soft-arrow"/>

  <rect x="44" y="590" width="1168" height="92" rx="10" fill="#f7fafc" stroke="#d5dde5"/>
  <text x="68" y="624" class="label">Boundary rule</text>
  <text x="68" y="650" class="body">Models interpret state and routing from explicit package context. Code validates contracts, access proof, freshness, gap visibility, persistence, and audit.</text>
  <text x="68" y="672" class="body">Federation packs authorize remote query routes only; packages carry summaries, refs, watermarks, and repair guidance rather than raw materialization.</text>
</svg>
